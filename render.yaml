services:
  - type: web
    name: wavemeet-backend
    env: node
    buildCommand: npm install --production
    startCommand: npm run server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGO_URI
        sync: false
    healthCheckPath: /
    autoDeploy: true
    plan: free

  - type: web
    name: wavemeet-frontend
    env: node
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run preview
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://wavemeet-backend.onrender.com
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
    healthCheckPath: /
    autoDeploy: true
    plan: free